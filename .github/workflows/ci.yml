name: CI

on:
  push:
    branches: [master]
    tags: ["jq-*"]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux targets
          - arch: amd64
            host: x86_64-linux-gnu
            cc: x86_64-linux-gnu-gcc

          - arch: arm64
            host: aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc

          - arch: i386
            host: i686-linux-gnu
            cc: i686-linux-gnu-gcc

          # Windows targets (LLVM MinGW)
          - arch: win-amd64
            host: x86_64-w64-mingw32

          - arch: win-i386
            host: i686-w64-mingw32

          - arch: win-arm64
            host: aarch64-w64-mingw32

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # ----------------------------
      # Linux toolchains
      # ----------------------------
      - name: Install Linux toolchains
        if: startsWith(matrix.arch, 'win-') == false
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool \
            gcc-${{ matrix.host }}

      # ----------------------------
      # LLVM MinGW (Windows)
      # ----------------------------
      - name: Install LLVM MinGW
        if: startsWith(matrix.arch, 'win-')
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y clang lld curl xz-utils

          curl -L https://github.com/mstorsjo/llvm-mingw/releases/latest/download/llvm-mingw-20240220-ucrt-ubuntu-20.04-x86_64.tar.xz -o llvm-mingw.tar.xz
          tar -xf llvm-mingw.tar.xz

          LLVM_DIR=$(find . -maxdepth 1 -type d -name "llvm-mingw-*")
          echo "$PWD/$LLVM_DIR/bin" >> $GITHUB_PATH

      # ----------------------------
      # Build
      # ----------------------------
      - name: Build
        run: |
          set -e
          autoreconf -i

          ARCH="${{ matrix.arch }}"

          if [[ "$ARCH" == win-* ]]; then
            HOST="${{ matrix.host }}"
            CC=clang
            OUT="jq-windows-${ARCH#win-}.exe"
          else
            HOST="${{ matrix.host }}"
            CC="${{ matrix.cc }}"
            OUT="jq-linux-${ARCH}"
          fi

          ./configure \
            --host="$HOST" \
            --disable-docs \
            --with-oniguruma=builtin \
            --enable-static \
            --enable-all-static \
            CC="$CC" \
            CFLAGS="-O2"

          make -j$(nproc)

          if [[ "$ARCH" == win-* ]]; then
            cp jq.exe "$OUT"
          else
            cp jq "$OUT"
          fi

      # ----------------------------
      # Test (native only)
      # ----------------------------
      - name: Test
        if: matrix.arch == 'amd64'
        run: |
          make check

      # ----------------------------
      # Artifacts
      # ----------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jq-${{ matrix.arch }}
          path: |
            jq-linux-*
            jq-windows-*.exe

  # ----------------------------
  # Release
  # ----------------------------
  release:
    runs-on: ubuntu-latest
    needs: linux
    if: startsWith(github.ref, 'refs/tags/jq-')

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: jq-*
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"

          sha256sum jq-* > sha256sum.txt

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            jq-* sha256sum.txt
