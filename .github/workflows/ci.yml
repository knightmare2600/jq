name: CI

on:
  push:
    branches: [master]
    tags: ["jq-*"]
  pull_request:

jobs:

  build:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:

          # -------------------------
          # Linux targets
          # -------------------------
          - arch: linux-amd64
            host: x86_64-linux-gnu
            cc: gcc

          - arch: linux-arm64
            host: aarch64-linux-gnu
            pkg: gcc-aarch64-linux-gnu

          - arch: linux-i386
            host: i686-linux-gnu
            pkg: gcc-i686-linux-gnu

          # -------------------------
          # Windows via LLVM MinGW
          # -------------------------
          - arch: win-amd64
            host: x86_64-w64-mingw32

          - arch: win-i386
            host: i686-w64-mingw32

          - arch: win-arm64
            host: aarch64-w64-mingw32

    steps:

      - uses: actions/checkout@v4
        with:
          submodules: true

      # -------------------------
      # Install Linux toolchains
      # -------------------------
      - name: Install toolchains
        run: |
          sudo apt-get update

          # base build tools (always valid on noble)
          sudo apt-get install -y \
            autoconf automake libtool \
            clang lld curl xz-utils make

          # install ONLY if defined
          if [[ "${{ matrix.pkg }}" != "" ]]; then
            sudo apt-get install -y ${{ matrix.pkg }}
          fi

      # -------------------------
      # LLVM MinGW (stable release, NOT latest)
      # -------------------------
      - name: Install LLVM MinGW
        if: startsWith(matrix.arch, 'win-')
        run: |
          set -e

          curl -L \
            https://github.com/mstorsjo/llvm-mingw/releases/download/20240220/llvm-mingw-20240220-ucrt-ubuntu-20.04-x86_64.tar.xz \
            -o llvm-mingw.tar.xz

          ls -lh llvm-mingw.tar.xz

          tar -xf llvm-mingw.tar.xz

          LLVM_DIR=$(find . -maxdepth 1 -type d -name "llvm-mingw-*")
          echo "$PWD/$LLVM_DIR/bin" >> $GITHUB_PATH

      # -------------------------
      # Build
      # -------------------------
      - name: Build
        run: |
          set -e
          autoreconf -i

          ARCH="${{ matrix.arch }}"

          if [[ "$ARCH" == win-* ]]; then
            HOST="${{ matrix.host }}"
            CC=clang
            OUT="jq-${ARCH}.exe"
          else
            HOST="${{ matrix.host }}"
            CC="${{ matrix.cc:-${{ matrix.pkg }}-gcc }}"
            OUT="jq-${ARCH}"
          fi

          ./configure \
            --host="$HOST" \
            --disable-docs \
            --with-oniguruma=builtin \
            --enable-static \
            CC="$CC" \
            CFLAGS="-O2"

          make -j$(nproc)

          if [[ "$ARCH" == win-* ]]; then
            cp jq.exe "$OUT"
          else
            cp jq "$OUT"
          fi

      # -------------------------
      # Test only native
      # -------------------------
      - name: Test
        if: matrix.arch == 'linux-amd64'
        run: |
          make check

      # -------------------------
      # Upload artifacts
      # -------------------------
      - uses: actions/upload-artifact@v4
        with:
          name: jq-${{ matrix.arch }}
          path: jq-*
          if-no-files-found: error

  # -------------------------
  # Release
  # -------------------------
  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/jq-')

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: jq-*
          merge-multiple: true

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"

          sha256sum jq-* > sha256sum.txt

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            jq-* sha256sum.txt
