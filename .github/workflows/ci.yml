name: CI

on:
  push:
    branches: [master]
    tags: ["jq-*"]
  pull_request:

jobs:

  build:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:

          # ---------------- Linux ----------------
          - arch: linux-amd64
            host: x86_64-linux-gnu

          - arch: linux-arm64
            host: aarch64-linux-gnu
            pkg: gcc-aarch64-linux-gnu

          - arch: linux-i386
            host: i686-linux-gnu
            pkg: gcc-i686-linux-gnu

          # ---------------- Windows (LLVM MinGW) ----------------
          - arch: win-amd64
            host: x86_64-w64-mingw32

          - arch: win-i386
            host: i686-w64-mingw32

          - arch: win-arm64
            host: aarch64-w64-mingw32

    steps:

      - uses: actions/checkout@v4
        with:
          submodules: true

      # ---------------- Dependencies ----------------
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool \
            clang lld curl xz-utils make \
            gcc-aarch64-linux-gnu gcc-i686-linux-gnu

          if [ -n "${{ matrix.pkg }}" ]; then
            sudo apt-get install -y "${{ matrix.pkg }}"
          fi

      # ---------------- LLVM MinGW ----------------
      - name: Install LLVM MinGW
        if: startsWith(matrix.arch, 'win-')
        run: |
          set -e
          VERSION="20240220"
          URL="https://github.com/mstorsjo/llvm-mingw/releases/download/${VERSION}/llvm-mingw-${VERSION}-ucrt-x86_64.tar.xz"
          echo "Downloading: $URL"
          curl -fL "$URL" -o llvm-mingw.tar.xz
          file llvm-mingw.tar.xz
          tar -xf llvm-mingw.tar.xz
          LLVM_DIR=$(find . -maxdepth 1 -type d -name "llvm-mingw-*")
          echo "$PWD/$LLVM_DIR/bin" >> $GITHUB_PATH
          
      # ---------------- Build ----------------
      - name: Build
        run: |
          set -e
          autoreconf -i

          ARCH="${{ matrix.arch }}"
          HOST="${{ matrix.host }}"

          if [[ "$ARCH" == win-* ]]; then
            CC=clang
            OUT="jq-${ARCH}.exe"
          else
            CC="${HOST}-gcc"
            OUT="jq-${ARCH}"
          fi

          export CC

          ./configure \
            --host="$HOST" \
            --disable-docs \
            --with-oniguruma=builtin \
            --enable-static \
            CFLAGS="-O2"

          make -j"$(nproc)"

          if [[ "$ARCH" == win-* ]]; then
            cp jq.exe "$OUT"
          else
            cp jq "$OUT"
          fi

      # ---------------- Test ----------------
      - name: Test (Linux only)
        if: matrix.arch == 'linux-amd64'
        run: make check

      # ---------------- Artifacts ----------------
      - uses: actions/upload-artifact@v4
        with:
          name: jq-${{ matrix.arch }}
          path: jq-*
          if-no-files-found: error


  # =========================================================
  # macOS
  # =========================================================
  macos:
    runs-on: macos-14

    strategy:
      matrix:
        include:

          - arch: macos-amd64
            target: x86_64-apple-darwin

          - arch: macos-arm64
            target: arm64-apple-darwin

    steps:

      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          brew update || true
          brew install autoconf automake libtool

      - name: Build macOS
        run: |
          set -e
          autoreconf -i

          export CC="clang -target ${{ matrix.target }}"
          export CFLAGS="-O2"

          ./configure \
            --host="${{ matrix.target }}" \
            --disable-docs \
            --with-oniguruma=builtin \
            --enable-static \
            CC="$CC" \
            CFLAGS="$CFLAGS"

          make -j"$(sysctl -n hw.logicalcpu)"

          strip jq
          cp jq "${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: jq-${{ matrix.arch }}
          path: jq-*


  # ---------------- Release ----------------
  release:
    runs-on: ubuntu-latest
    needs: [build, macos]
    if: startsWith(github.ref, 'refs/tags/jq-')

    steps:

      - uses: actions/download-artifact@v4
        with:
          pattern: jq-*
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"

          sha256sum jq-* > sha256sum.txt

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            jq-* sha256sum.txt
